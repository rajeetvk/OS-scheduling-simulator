<!DOCTYPE html>
<html>
<head>
    <title>CPU Scheduler Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CPU Scheduling Simulator</h1>

    <label>Select Algorithm:</label>
    <select id="algorithm">
        <option value="fcfs">FCFS</option>
        <option value="sjf">SJF</option>
        <option value="srtf">SRTF</option>
        <option value="ljf">LJF</option>
        <option value="lrtf">LRTF</option>
        <option value="rr">Round Robin</option>
    </select>

    <div id="timeQuantumDiv" style="display:none;">
        <label>Time Quantum:</label>
        <input type="number" id="timeQuantum" />
    </div>

    <h3>Processes</h3>
    <div id="processContainer"></div>

    <button onclick="addProcess()">Add Process</button>
    <button onclick="runScheduler()">Run</button>

    <h3>Result</h3>
    <pre id="result"></pre>

    <script src="script.js"></script>
</body>
</html>
